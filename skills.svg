<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060612"/>
      <stop offset="100%" style="stop-color:#0d0b2a"/>
    </linearGradient>
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1200" height="180" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="16" font-weight="600" fill="white" fill-opacity="0.7" letter-spacing="4">🛠️  SKILLS  &amp;  TOOLS</text>
  <rect x="480" y="40" width="240" height="1" fill="url(#neon)" opacity="0.5"/>

  <!-- Card 1: C -->
  <rect x="40" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="40" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="40" y="55" width="150" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
  <text x="115" y="100" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="#00d4ff" filter="url(#glow)">C</text>
  <text x="115" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="white" fill-opacity="0.6">C Language</text>
  <text x="115" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#00d4ff" fill-opacity="0.7">Expert</text>

  <!-- Card 2: Python -->
  <rect x="210" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="210" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="210" y="55" width="150" height="2" rx="1" fill="#a855f7" opacity="0.8"/>
  <text x="285" y="100" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#a855f7" filter="url(#glow)">Python</text>
  <text x="285" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="white" fill-opacity="0.6">Python 3</text>
  <text x="285" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#a855f7" fill-opacity="0.7">Advanced</text>

  <!-- Card 3: OpenCV -->
  <rect x="380" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="380" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="380" y="55" width="150" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
  <text x="455" y="100" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#00d4ff" filter="url(#glow)">OpenCV</text>
  <text x="455" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="white" fill-opacity="0.6">Computer Vision</text>
  <text x="455" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#00d4ff" fill-opacity="0.7">Applied</text>

  <!-- Card 4: HTML/CSS/JS -->
  <rect x="550" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="550" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="550" y="55" width="150" height="2" rx="1" fill="#a855f7" opacity="0.8"/>
  <text x="625" y="97" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#a855f7" filter="url(#glow)">HTML · CSS</text>
  <text x="625" y="116" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#a855f7" filter="url(#glow)">JavaScript</text>
  <text x="625" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#a855f7" fill-opacity="0.7">Intermediate</text>

  <!-- Card 5: NumPy -->
  <rect x="720" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="720" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="720" y="55" width="150" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
  <text x="795" y="100" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#00d4ff" filter="url(#glow)">NumPy</text>
  <text x="795" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="white" fill-opacity="0.6">Data Arrays</text>
  <text x="795" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#00d4ff" fill-opacity="0.7">Applied</text>

  <!-- Card 6: Git/GitHub -->
  <rect x="890" y="55" width="150" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="890" y="55" width="150" height="100" rx="14" fill="url(#cardGlass)" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="890" y="55" width="150" height="2" rx="1" fill="#a855f7" opacity="0.8"/>
  <text x="965" y="97" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#a855f7" filter="url(#glow)">Git</text>
  <text x="965" y="116" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#a855f7" filter="url(#glow)">GitHub</text>
  <text x="965" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#a855f7" fill-opacity="0.7">Version Control</text>

  <!-- Card 7: VS Code -->
  <rect x="1060" y="55" width="100" height="100" rx="14" fill="#060612" opacity="0.7" filter="url(#blur8)"/>
  <rect x="1060" y="55" width="100" height="100" rx="14" fill="url(#cardGlass)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="1060" y="55" width="100" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
  <text x="1110" y="97" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#00d4ff" filter="url(#glow)">VS Code</text>
  <text x="1110" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#00d4ff" filter="url(#glow)">Linux</text>
  <text x="1110" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#00d4ff" fill-opacity="0.7">Daily Tools</text>
</svg>
