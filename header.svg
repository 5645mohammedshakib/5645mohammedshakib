<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10101c" stroke-width="1"/>
    </pattern>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#05050f"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <!-- Neon Underline Gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <!-- Radial Glow Orbs -->
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
      .star { animation: pulse 3s ease-in-out infinite; }
      .star-delayed { animation: pulse 4s ease-in-out infinite 1s; }
      .header-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Solid Pitch Black Base -->
  <rect width="1200" height="180" fill="url(#bg)"/>
  
  <!-- Glowing Grid overlay -->
  <rect width="1200" height="180" fill="url(#grid)"/>

  <!-- Large Radial Ambient Glowing Orbs -->
  <ellipse cx="250" cy="90" rx="250" ry="90" fill="url(#orbCyan)"/>
  <ellipse cx="950" cy="90" rx="250" ry="90" fill="url(#orbPurple)"/>

  <!-- Futuristic Cyber Accent Grid Corners -->
  <path d="M 30,20 L 10,20 L 10,40" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 1170,20 L 1190,20 L 1190,40" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 30,160 L 10,160 L 10,140" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 1170,160 L 1190,160 L 1190,140" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Scanning laser line -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" />
  <line x1="0" y1="179" x2="1200" y2="179" stroke="#7c3aed" stroke-width="1.5" opacity="0.4" />

  <!-- Twinkling stars -->
  <circle cx="100" cy="40" r="1" fill="#fff" class="star"/>
  <circle cx="280" cy="30" r="1.5" fill="#00d4ff" class="star-delayed" filter="url(#neonGlow)"/>
  <circle cx="550" cy="25" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="720" cy="35" r="1.5" fill="#7c3aed" class="star" filter="url(#neonGlow)"/>
  <circle cx="980" cy="45" r="1" fill="#fff" class="star-delayed"/>
  <circle cx="1100" cy="30" r="1.2" fill="#00d4ff" class="star"/>

  <!-- Name Main Text -->
  <text x="600" y="80" text-anchor="middle" class="header-text" font-size="46" font-weight="900" fill="#ffffff" letter-spacing="4" filter="url(#glow)">
    MOHAMMED SHAKIB
  </text>

  <!-- Glowing Tech Accent Underline Bar -->
  <rect x="380" y="98" width="440" height="3" rx="1.5" fill="url(#neon)" filter="url(#neonGlow)"/>
  <circle cx="600" cy="99.5" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Subtitle Terminal Shell style -->
  <text x="600" y="132" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="14" font-weight="bold" fill="#00d4ff" letter-spacing="2">
    &gt;_ COMPUTER SCIENCE (AI &amp; ML)  |  COMPUTER VISION  |  PYTHON  |  C
  </text>
  
  <!-- Small details bar -->
  <text x="600" y="155" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#6c7a9c" letter-spacing="1">
    SYSTEMS: READY // CONNECTIVITY: ONLINE // EST. 2024
  </text>
</svg>
