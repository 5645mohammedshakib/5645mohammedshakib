<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#12121a" stroke-width="1"/>
    </pattern>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020205"/>
      <stop offset="50%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#020205"/>
    </linearGradient>
    <!-- Neon Accent Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <!-- Card Gloss Gradient -->
    <linearGradient id="cardGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d15;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#040408;stop-opacity:0.95"/>
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background and Grid -->
  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#grid)"/>

  <!-- Left Sidebar Panel: Welcome Message -->
  <rect x="20" y="20" width="360" height="180" rx="8" fill="url(#cardGloss)" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="20" y="20" width="6" height="180" fill="url(#neonCyan)"/>
  
  <text x="45" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" letter-spacing="2">SYSTEM::INIT</text>
  <text x="45" y="95" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="1">Welcome to</text>
  <text x="45" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="1">M. Shakib's Hub</text>
  
  <!-- Terminal-style loading line -->
  <text x="45" y="165" font-family="'JetBrains Mono', Consolas, monospace" font-size="12" fill="#5c6a8c">&gt;_ Connection established. Active</text>
  <circle cx="280" cy="161" r="4" fill="#00d4ff" filter="url(#glow)"/>

  <!-- Right Dashboard Grid: 4 Stats Cards -->

  <!-- CARD 1: Core Technologies (Completed) -->
  <rect x="400" y="20" width="370" height="85" rx="8" fill="url(#cardGloss)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="420" y="45" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#7c3aed" letter-spacing="1">CORE (COMPLETED)</text>
  <text x="420" y="70" font-family="'JetBrains Mono', Consolas, monospace" font-size="18" font-weight="bold" fill="#ffffff">C &amp; Data Structures</text>
  <circle cx="740" cy="40" r="5" fill="#7c3aed" filter="url(#glow)"/>

  <!-- CARD 2: Current Focus (Currently Learning) -->
  <rect x="790" y="20" width="390" height="85" rx="8" fill="url(#cardGloss)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="810" y="45" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#00d4ff" letter-spacing="1">ACTIVE TRAINING</text>
  <text x="810" y="70" font-family="'JetBrains Mono', Consolas, monospace" font-size="16" font-weight="bold" fill="#ffffff">Java, JS, HTML, Django</text>
  <circle cx="1150" cy="40" r="5" fill="#00d4ff" filter="url(#glow)"/>

  <!-- CARD 3: Location -->
  <rect x="400" y="115" width="370" height="85" rx="8" fill="url(#cardGloss)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="420" y="140" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#5c6a8c" letter-spacing="1">LOCATION</text>
  <text x="420" y="168" font-family="'JetBrains Mono', Consolas, monospace" font-size="20" font-weight="bold" fill="#ffffff">India</text>
  <!-- Tiny map point representation -->
  <circle cx="740" cy="155" r="4" fill="#5c6a8c"/>

  <!-- CARD 4: Purpose/Goal -->
  <rect x="790" y="115" width="390" height="85" rx="8" fill="url(#cardGloss)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="810" y="140" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#22c55e" letter-spacing="1">TARGET OBJECTIVE</text>
  <text x="810" y="168" font-family="'JetBrains Mono', Consolas, monospace" font-size="18" font-weight="bold" fill="#ffffff">Build Intelligent Systems</text>
  <circle cx="1150" cy="155" r="5" fill="#22c55e" filter="url(#glow)"/>

</svg>
