<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060612"/>
      <stop offset="40%" style="stop-color:#0d0b2a"/>
      <stop offset="100%" style="stop-color:#060612"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur10">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blur20">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes pulse  { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .f1{animation:float1 5s ease-in-out infinite}
      .f2{animation:float2 7s ease-in-out infinite}
      .p1{animation:pulse 3s ease-in-out infinite}
      .p2{animation:pulse 2s ease-in-out infinite}
    </style>
  </defs>

  <!-- BG -->
  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="140" rx="200" ry="160" fill="url(#glow2)" filter="url(#blur20)"/>
  <ellipse cx="1000" cy="140" rx="200" ry="160" fill="url(#glow1)" filter="url(#blur20)"/>
  <ellipse cx="600" cy="280" rx="250" ry="100" fill="url(#glow1)" filter="url(#blur20)" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="50" cy="20" r="1.2" fill="white" opacity="0.6" class="p1"/>
  <circle cx="180" cy="50" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="320" cy="15" r="1" fill="#00d4ff" opacity="0.5" class="p2"/>
  <circle cx="450" cy="35" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="600" cy="10" r="1.2" fill="#a855f7" opacity="0.6" class="p1"/>
  <circle cx="750" cy="25" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="900" cy="18" r="1" fill="#00d4ff" opacity="0.5"/>
  <circle cx="1050" cy="40" r="1.2" fill="white" opacity="0.6" class="p2"/>
  <circle cx="1150" cy="12" r="0.8" fill="#a855f7" opacity="0.4"/>
  <circle cx="80" cy="240" r="1" fill="#00d4ff" opacity="0.4" class="p1"/>
  <circle cx="230" cy="260" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="980" cy="250" r="1.2" fill="#a855f7" opacity="0.5" class="p2"/>
  <circle cx="1100" cy="230" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="370" cy="265" r="1" fill="white" opacity="0.3"/>
  <circle cx="820" cy="270" r="0.8" fill="#00d4ff" opacity="0.4"/>

  <!-- Floating glass panels (background depth) -->
  <rect x="30" y="60" width="90" height="60" rx="12" fill="url(#glassGrad)" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.4" filter="url(#blur4)" class="f2" opacity="0.7"/>
  <rect x="1080" y="80" width="80" height="55" rx="12" fill="url(#glassGrad)" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.4" filter="url(#blur4)" class="f1" opacity="0.7"/>
  <rect x="1100" y="160" width="60" height="40" rx="8" fill="url(#glassGrad)" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3" class="f2" opacity="0.5"/>
  <rect x="20" y="160" width="70" height="45" rx="10" fill="url(#glassGrad)" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.3" class="f1" opacity="0.5"/>

  <!-- Wireframe cube top-right -->
  <g class="f2" opacity="0.5">
    <polygon points="1060,30 1090,20 1120,30 1090,40" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.6"/>
    <polygon points="1060,30 1060,55 1090,65 1090,40" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
    <polygon points="1090,40 1090,65 1120,55 1120,30" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Wireframe cube bottom-left -->
  <g class="f1" opacity="0.4">
    <polygon points="60,210 85,200 110,210 85,220" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.6"/>
    <polygon points="60,210 60,235 85,245 85,220" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.4"/>
    <polygon points="85,220 85,245 110,235 110,210" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- MAIN GLASS PANEL blur layer -->
  <rect x="140" y="30" width="920" height="220" rx="22" fill="#1a1a3a" opacity="0.6" filter="url(#blur10)"/>

  <!-- MAIN GLASS PANEL -->
  <rect x="140" y="30" width="920" height="220" rx="22" fill="url(#glassGrad)"/>

  <!-- Top neon border line -->
  <rect x="140" y="30" width="920" height="2" rx="2" fill="url(#neon1)" opacity="0.9"/>
  <!-- Bottom faint border -->
  <rect x="140" y="248" width="920" height="1" rx="1" fill="url(#neon1)" opacity="0.3"/>
  <!-- Left border -->
  <rect x="140" y="30" width="1" height="220" fill="url(#neon2)" opacity="0.5"/>
  <!-- Right border -->
  <rect x="1059" y="30" width="1" height="220" fill="url(#neon2)" opacity="0.5"/>

  <!-- Inner glass shimmer -->
  <rect x="141" y="31" width="918" height="100" rx="21" fill="white" opacity="0.025"/>

  <!-- Neon accent line (left) -->
  <rect x="170" y="50" width="3" height="180" rx="2" fill="url(#neon2)" opacity="0.6" filter="url(#blur4)"/>

  <!-- Avatar circle placeholder with glow -->
  <circle cx="270" cy="140" r="65" fill="#0d0b2a" stroke="url(#neon1)" stroke-width="1.5" filter="url(#blur4)" opacity="0.8"/>
  <circle cx="270" cy="140" r="65" fill="none" stroke="url(#neon1)" stroke-width="1.5"/>
  <text x="270" y="128" text-anchor="middle" font-family="Arial" font-size="36" fill="#00d4ff" filter="url(#glow)">MS</text>
  <text x="270" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#a855f7" opacity="0.9">AI · ML · CS</text>

  <!-- Vertical separator -->
  <line x1="360" y1="55" x2="360" y2="225" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Name -->
  <text x="610" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="700" fill="white" filter="url(#softglow)">Mohammed Shakib</text>

  <!-- Neon underline -->
  <rect x="430" y="116" width="360" height="2" rx="1" fill="url(#neon1)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="610" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" letter-spacing="2" filter="url(#glow)">COMPUTER SCIENCE  ·  AI &amp; ML  ·  COMPUTER VISION</text>

  <!-- Info pills -->
  <!-- India pill -->
  <rect x="420" y="165" width="90" height="26" rx="13" fill="white" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="465" y="183" text-anchor="middle" font-family="Arial" font-size="11" fill="#00d4ff">📍 India</text>

  <!-- Student pill -->
  <rect x="525" y="165" width="105" height="26" rx="13" fill="white" fill-opacity="0.07" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="577" y="183" text-anchor="middle" font-family="Arial" font-size="11" fill="#a855f7">🎓 B.Tech CS</text>

  <!-- OpenCV pill -->
  <rect x="645" y="165" width="110" height="26" rx="13" fill="white" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="700" y="183" text-anchor="middle" font-family="Arial" font-size="11" fill="#00d4ff">👁️ OpenCV</text>

  <!-- Python pill -->
  <rect x="770" y="165" width="95" height="26" rx="13" fill="white" fill-opacity="0.07" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="817" y="183" text-anchor="middle" font-family="Arial" font-size="11" fill="#a855f7">🐍 Python</text>

  <!-- Quote -->
  <text x="610" y="222" text-anchor="middle" font-family="Arial" font-size="12" fill="white" fill-opacity="0.35" font-style="italic">"Teaching machines to see, think and learn"</text>

</svg>
