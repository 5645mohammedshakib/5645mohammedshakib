<svg width="480" height="340" viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="windowBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#07070a"/>
      <stop offset="100%" style="stop-color:#010103"/>
    </linearGradient>
    <!-- Border Gradient -->
    <linearGradient id="neonBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main Window Container -->
  <rect x="10" y="10" width="460" height="320" rx="12" fill="url(#windowBg)" stroke="url(#neonBorder)" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Title/Header Bar -->
  <path d="M10,22 C10,15.37 15.37,10 22,10 L458,10 C464.63,10 470,15.37 470,22 L470,42 L10,42 Z" fill="#0c0d14"/>
  <line x1="10" y1="42" x2="470" y2="42" stroke="#181a26" stroke-width="1"/>

  <!-- Window Control Dots -->
  <circle cx="32" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="26" r="6" fill="#27c93f"/>

  <!-- Tab Title -->
  <text x="240" y="30" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" font-weight="600" fill="#a0aec0">
    mohammed.js
  </text>

  <!-- Editor Line Numbers -->
  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="12" fill="#3a3d52" text-anchor="end">
    <text x="35" y="75">1</text>
    <text x="35" y="98">2</text>
    <text x="35" y="121">3</text>
    <text x="35" y="144">4</text>
    <text x="35" y="167">5</text>
    <text x="35" y="190">6</text>
    <text x="35" y="213">7</text>
    <text x="35" y="236">8</text>
    <text x="35" y="259">9</text>
    <text x="35" y="282">10</text>
    <text x="35" y="305">11</text>
  </g>

  <!-- Code Content -->
  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="12" font-weight="500" xml:space="preserve">
    <!-- Line 1 -->
    <text x="55" y="75">
      <tspan fill="#f97316">const</tspan> <tspan fill="#f43f5e">developer</tspan> = <tspan fill="#d946ef">{</tspan>
    </text>
    <!-- Line 2 -->
    <text x="75" y="98">
      <tspan fill="#06b6d4">name</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#10b981">"Mohammed Shakib"</tspan><tspan fill="#cbd5e1">,</tspan>
    </text>
    <!-- Line 3 -->
    <text x="75" y="121">
      <tspan fill="#06b6d4">degree</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#10b981">"B.Tech — CSE (AI &amp; ML)"</tspan><tspan fill="#cbd5e1">,</tspan>
    </text>
    <!-- Line 4 -->
    <text x="75" y="144">
      <tspan fill="#06b6d4">vision</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#d946ef">[</tspan>
    </text>
    <!-- Line 5 -->
    <text x="95" y="167">
      <tspan fill="#10b981">"Computer Vision"</tspan><tspan fill="#cbd5e1">,</tspan> <tspan fill="#10b981">"OpenCV"</tspan><tspan fill="#cbd5e1">,</tspan> <tspan fill="#10b981">"Python"</tspan>
    </text>
    <!-- Line 6 -->
    <text x="75" y="190">
      <tspan fill="#d946ef">]</tspan><tspan fill="#cbd5e1">,</tspan>
    </text>
    <!-- Line 7 -->
    <text x="75" y="213">
      <tspan fill="#06b6d4">core</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#d946ef">[</tspan><tspan fill="#10b981">"C"</tspan><tspan fill="#cbd5e1">,</tspan> <tspan fill="#10b981">"Data Structures &amp; Algos"</tspan><tspan fill="#d946ef">]</tspan><tspan fill="#cbd5e1">,</tspan>
    </text>
    <!-- Line 8 -->
    <text x="75" y="236">
      <tspan fill="#06b6d4">location</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#10b981">"India"</tspan><tspan fill="#cbd5e1">,</tspan>
    </text>
    <!-- Line 9 -->
    <text x="75" y="259">
      <tspan fill="#06b6d4">goal</tspan><tspan fill="#cbd5e1">:</tspan> <tspan fill="#10b981">"Build intelligent systems"</tspan>
    </text>
    <!-- Line 10 -->
    <text x="55" y="282">
      <tspan fill="#d946ef">};</tspan>
    </text>
    <!-- Line 11 -->
    <text x="55" y="305">
      <tspan fill="#64748b" font-style="italic">// Ready to push the boundaries of AI...</tspan>
    </text>
  </g>
</svg>
