<svg width="550" height="330" viewBox="0 0 550 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#07070a"/>
      <stop offset="100%" style="stop-color:#010103"/>
    </linearGradient>
    <!-- Border Gradient -->
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main Card Container -->
  <rect x="5" y="5" width="540" height="320" rx="10" fill="url(#cardBg)" stroke="url(#cardBorder)" stroke-width="1.5"/>

  <!-- Card Title -->
  <text x="25" y="40" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="900" fill="#ffffff" letter-spacing="2">
    CORE TECHNOLOGIES
  </text>
  <line x1="25" y1="52" x2="525" y2="52" stroke="#1f1f35" stroke-width="1.5"/>

  <!-- SECTION 1: COMPLETED SYSTEMS -->
  <text x="25" y="80" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#7c3aed" letter-spacing="1.5">
    [ SYSTEM CORE :: COMPLETED ]
  </text>

  <!-- C Badge -->
  <g transform="translate(25, 95)">
    <rect width="180" height="36" rx="6" fill="#0d0d15" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#22c55e" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">C Language</text>
  </g>

  <!-- Data Structures Badge -->
  <g transform="translate(220, 95)">
    <rect width="180" height="36" rx="6" fill="#0d0d15" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#22c55e" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">Data Structures</text>
  </g>

  <!-- Algorithms Badge -->
  <g transform="translate(415, 95)">
    <rect width="100" height="36" rx="6" fill="#0d0d15" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#22c55e" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">Algorithms</text>
  </g>


  <!-- SECTION 2: CURRENTLY LEARNING -->
  <text x="25" y="175" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#00d4ff" letter-spacing="1.5">
    [ TRAINING COMPILERS :: ACTIVE ]
  </text>

  <!-- Java Badge -->
  <g transform="translate(25, 190)">
    <rect width="150" height="36" rx="6" fill="#0d0d15" stroke="#1f1f35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#f59e0b" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">Java Compile</text>
  </g>

  <!-- JavaScript Badge -->
  <g transform="translate(190, 190)">
    <rect width="150" height="36" rx="6" fill="#0d0d15" stroke="#1f1f35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#f59e0b" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">JavaScript</text>
  </g>

  <!-- HTML Badge -->
  <g transform="translate(355, 190)">
    <rect width="160" height="36" rx="6" fill="#0d0d15" stroke="#1f1f35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#f59e0b" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">HTML5 / Web</text>
  </g>

  <!-- Django Badge -->
  <g transform="translate(25, 245)">
    <rect width="150" height="36" rx="6" fill="#0d0d15" stroke="#1f1f35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#f59e0b" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">Django Framework</text>
  </g>

  <!-- Python Badge -->
  <g transform="translate(190, 245)">
    <rect width="150" height="36" rx="6" fill="#0d0d15" stroke="#1f1f35" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#f59e0b" filter="url(#glow)"/>
    <text x="35" y="23" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#ffffff">Python</text>
  </g>
  
  <!-- System Status Info -->
  <text x="25" y="305" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4b5563">
    STATUS: SYNCED // COMPILER LEVEL: OPTIMIZED
  </text>
</svg>
