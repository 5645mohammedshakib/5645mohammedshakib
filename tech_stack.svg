<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#07070a"/>
      <stop offset="100%" style="stop-color:#010103"/>
    </linearGradient>
    <!-- Border Gradient -->
    <linearGradient id="neonBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <!-- Card Gloss Gradient -->
    <linearGradient id="cardGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161622;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0d0d14;stop-opacity:0.8"/>
    </linearGradient>
    <!-- Dropshadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Main Console Board -->
  <rect x="10" y="10" width="780" height="320" rx="16" fill="url(#panelBg)" stroke="url(#neonBorder)" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Console Header -->
  <path d="M10,26 C10,17.16 17.16,10 26,10 L774,10 C782.84,10 790,17.16 790,26 L790,46 L10,46 Z" fill="#0c0d14"/>
  <line x1="10" y1="46" x2="790" y2="46" stroke="#1c1e2f" stroke-width="1"/>
  <!-- Console Icons -->
  <circle cx="35" cy="28" r="5" fill="#ef4444"/>
  <circle cx="51" cy="28" r="5" fill="#eab308"/>
  <circle cx="67" cy="28" r="5" fill="#22c55e"/>
  
  <text x="400" y="32" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" font-weight="700" fill="#00d4ff" letter-spacing="2">
    CONSOLE::SYSTEM_TECH_STACK
  </text>

  <!-- ================= LANGUAGES COLUMN (x: 35) ================= -->
  <text x="35" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#a0aec0" letter-spacing="1">
    / LANGUAGES
  </text>
  
  <!-- C -->
  <rect x="35" y="95" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="55" cy="115" r="8" fill="#00599c" opacity="0.8"/>
  <text x="55" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">C</text>
  <text x="80" y="119" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">C Language</text>

  <!-- Python -->
  <rect x="35" y="145" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="55" cy="165" r="8" fill="#3776ab" opacity="0.8"/>
  <text x="55" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Py</text>
  <text x="80" y="169" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">Python</text>

  <!-- JavaScript -->
  <rect x="35" y="195" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <rect x="47" y="157" width="16" height="16" rx="2" fill="#f7df1e" transform="translate(0, 38)" opacity="0.8"/>
  <text x="55" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">JS</text>
  <text x="80" y="219" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">JavaScript</text>

  <!-- HTML & CSS -->
  <rect x="35" y="245" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="55" cy="265" r="8" fill="#e34f26" opacity="0.8"/>
  <text x="55" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">H5</text>
  <text x="80" y="269" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">HTML5 / CSS3</text>


  <!-- ================= AI / ML / CV COLUMN (x: 290) ================= -->
  <text x="290" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#a0aec0" letter-spacing="1">
    / AI, ML &amp; COMPUTER VISION
  </text>

  <!-- OpenCV -->
  <rect x="290" y="95" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="310" cy="115" r="8" fill="#27338e" opacity="0.8"/>
  <text x="310" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">CV</text>
  <text x="335" y="119" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">OpenCV</text>

  <!-- NumPy & Pandas -->
  <rect x="290" y="145" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="310" cy="165" r="8" fill="#013243" opacity="0.8"/>
  <text x="310" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">NP</text>
  <text x="335" y="169" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">NumPy / Pandas</text>

  <!-- TensorFlow / PyTorch -->
  <rect x="290" y="195" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="310" cy="215" r="8" fill="#ff6f00" opacity="0.8"/>
  <text x="310" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">TF</text>
  <text x="335" y="219" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">TensorFlow / ML</text>

  <!-- Scikit-learn -->
  <rect x="290" y="245" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="310" cy="265" r="8" fill="#f7931e" opacity="0.8"/>
  <text x="310" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">SK</text>
  <text x="335" y="269" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">Scikit-learn</text>


  <!-- ================= TOOLS & PLATFORMS (x: 545) ================= -->
  <text x="545" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#a0aec0" letter-spacing="1">
    / TOOLS &amp; PLATFORMS
  </text>

  <!-- Git & GitHub -->
  <rect x="545" y="95" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="565" cy="115" r="8" fill="#f05032" opacity="0.8"/>
  <text x="565" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">GIT</text>
  <text x="590" y="119" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">Git &amp; GitHub</text>

  <!-- VS Code -->
  <rect x="545" y="145" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="565" cy="165" r="8" fill="#0078d4" opacity="0.8"/>
  <text x="565" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">VSC</text>
  <text x="590" y="169" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">VS Code</text>

  <!-- Linux OS -->
  <rect x="545" y="195" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="565" cy="215" r="8" fill="#fcc624" opacity="0.8"/>
  <text x="565" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="black">LNX</text>
  <text x="590" y="219" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">Linux Systems</text>

  <!-- Jupyter Notebooks -->
  <rect x="545" y="245" width="220" height="40" rx="8" fill="url(#cardGloss)" stroke="#1c1e2f" stroke-width="1"/>
  <circle cx="565" cy="265" r="8" fill="#f37626" opacity="0.8"/>
  <text x="565" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">JPT</text>
  <text x="590" y="269" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ffffff">Jupyter Notebook</text>

  <!-- Active Status bar -->
  <rect x="35" y="300" width="730" height="8" rx="4" fill="#0c0d14"/>
  <rect x="35" y="300" width="560" height="8" rx="4" fill="url(#neonBorder)"/>
</svg>
